apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: hyperdx
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: hyperdx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: hyperdx
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: otel-collector
          image: alphareds.azurecr.io/hyperdx-otel-collector:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
            - containerPort: 8888
              name: metrics
          env:
            - name: CLICKHOUSE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: hyperdx-config
                  key: CLICKHOUSE_ENDPOINT
            - name: HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: hyperdx-config
                  key: HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE
            - name: HYPERDX_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: hyperdx-config
                  key: HYPERDX_LOG_LEVEL
            - name: OPAMP_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: hyperdx-config
                  key: OPAMP_SERVER_URL
            - name: HYPERDX_OTEL_EXPORTER_CREATE_LEGACY_SCHEMA
              valueFrom:
                configMapKeyRef:
                  name: hyperdx-config
                  key: HYPERDX_OTEL_EXPORTER_CREATE_LEGACY_SCHEMA
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
