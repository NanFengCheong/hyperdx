# Secret values should be applied via kubectl commands, not committed to git.
# Example:
#   kubectl create secret generic hyperdx-secrets -n hyperdx \
#     --from-literal=HYPERDX_API_KEY=<your-api-key> \
#     --from-literal=OIDC_CLIENT_SECRET=<your-oidc-secret> \
#     --from-literal=SMTP_PASS=<your-smtp-pass> \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: hyperdx-secrets
  namespace: hyperdx
type: Opaque
stringData:
  HYPERDX_API_KEY: "${HYPERDX_API_KEY}"
  OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
  SMTP_PASS: "${SMTP_PASS}"
